syntax = "proto3";

package wop.woncore;

import "google/protobuf/duration.proto";

import "google/protobuf/timestamp.proto";

option go_package = "github.com/workoak/wop/won";

message WOReq {
  string wosrvs = 1;

  string wocmdid = 2;

  map<string, string> headers = 6;

  bytes payload = 10;
}

message WOResp {
  string wosrvs = 1;

  string wocmdid = 2;

  map<string, string> headers = 6;

  bytes payload = 10;
}

message WOLivlinessProbe {
}

message WOLivlinessProbeResult {
}
