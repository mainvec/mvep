name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Each Go module is built and tested standalone (GOWORK disabled) so CI mirrors
# how external consumers resolve the modules. The intra-repo replace directive in
# toolkit/go.mod points at ../runtime/go, which is present in the checkout.
env:
  GOWORK: "off"

jobs:
  build-and-test:
    name: Build, vet & test (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [toolkit, runtime/go]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Check formatting
        run: |
          # gofmt -l reports files that need formatting; fail if any.
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Test
        run: go test -count=1 ./...
