name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mvgen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: mvgen/go.mod
          cache-dependency-path: mvgen/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v

  lint:
    name: Go vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mvgen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: mvgen/go.mod
          cache-dependency-path: mvgen/go.sum

      - name: Vet
        run: go vet ./...